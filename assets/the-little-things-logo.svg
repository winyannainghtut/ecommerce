<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">The Little Things Logo</title>
  <desc id="logoDesc">Circular monochrome logo with an angel icon and text: the little things, HANDMADE &amp; STATIONERY.</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&amp;family=Montserrat:wght@300&amp;display=swap');
      
      .ring-thick { fill: none; stroke: #000; stroke-width: 14; }
      .ring-thin { fill: none; stroke: #000; stroke-width: 4; }
      
      .title {
        font-family: 'Dancing Script', cursive;
        font-size: 80px;
        font-weight: 500;
        fill: #000;
      }
      
      .subtitle {
        font-family: 'Montserrat', sans-serif;
        font-size: 26px;
        font-weight: 300;
        letter-spacing: 0.28em;
        fill: #000;
      }
    </style>
  </defs>

  <!-- Background Rings -->
  <circle cx="400" cy="400" r="390" fill="#fff" />
  <circle cx="400" cy="400" r="380" class="ring-thick" />
  <circle cx="400" cy="400" r="358" class="ring-thin" />

  <!-- Angel Drawing -->
  <g transform="translate(400, 275)">
    <!-- Halo -->
    <circle cx="0" cy="-35" r="58" fill="none" stroke="#000" stroke-width="2.5" />
    
    <!-- Left Wing -->
    <g id="wing">
      <path d="M -15,15 
               C -50,5 -75,10 -80,30 
               C -75,35 -65,35 -55,35 
               C -85,45 -95,70 -80,85 
               C -70,85 -60,82 -50,78 
               C -65,100 -55,115 -35,100 
               C -30,90 -20,70 -15,50" 
            fill="#fff" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Right Wing -->
    <use href="#wing" transform="scale(-1, 1)" />

    <!-- Dress -->
    <path d="M -15,38 L -35,102 L -20,112 L 0,102 L 20,112 L 35,102 L 15,38 Z" fill="#fff" stroke="#000" stroke-width="2.5" stroke-linejoin="round"/>
    
    <!-- Neckline -->
    <path d="M -15,38 L 0,48 L 15,38" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Heart Necklace -->
    <line x1="0" y1="48" x2="0" y2="53" stroke="#000" stroke-width="1.5" />
    <path d="M 0,55 C -5,51 -8,55 0,61 C 8,55 5,51 0,55 Z" fill="#000" />

    <!-- Buns (behind head) -->
    <circle cx="-32" cy="-32" r="16" fill="#000" />
    <circle cx="32" cy="-32" r="16" fill="#000" />

    <!-- Head -->
    <circle cx="0" cy="0" r="38" fill="#fff" stroke="#000" stroke-width="2.5" />
    
    <!-- Hair Bangs -->
    <path d="M -37.5,-5 A 38,38 0 0,1 37.5,-5 Q 20,-20 0,-2 Q -20,-20 -37.5,-5 Z" fill="#000" />
    <!-- Hair highlight -->
    <path d="M 5,-12 Q 13,-18 20,-8 Q 15,-13 5,-12 Z" fill="#fff" />

    <!-- Eyes (closed) -->
    <path d="M -22,10 Q -15,16 -8,10" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" />
    <path d="M 8,10 Q 15,16 22,10" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Nose -->
    <path d="M -1.5,18 Q 0,20 1.5,18" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" />
    <!-- Mouth -->
    <path d="M -3.5,25 Q 0,28 3.5,25" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" />

    <!-- Left Arm -->
    <path d="M -15,40 Q -25,70 -6,75" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" />
    <!-- Right Arm -->
    <path d="M 15,40 Q 25,65 12,71" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Wand Stick (slanting down to the right) -->
    <line x1="-20" y1="68" x2="35" y2="84" stroke="#000" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Wand Star -->
    <g transform="translate(35, 84) scale(0.65)">
      <polygon points="0,-15 5,-5 16,-5 7,2 11,13 0,6 -11,13 -7,2 -16,-5 -5,-5" fill="#fff" stroke="#000" stroke-width="2.5" stroke-linejoin="round" />
    </g>
    
    <!-- Wand Ribbon Trail -->
    <path d="M 46,79 Q 75,65 110,75 L 100,80 L 115,85 Q 75,95 40,88 Z" fill="#fff" stroke="#000" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- Top Floating Star -->
    <g transform="translate(0, -98) scale(0.6)">
      <polygon points="0,-15 5,-5 16,-5 7,2 11,13 0,6 -11,13 -7,2 -16,-5 -5,-5" fill="#000" />
    </g>
  </g>

  <!-- Text Section -->
  <text class="title" x="400" y="540" text-anchor="middle">the little things</text>
  <text class="subtitle" x="407" y="610" text-anchor="middle">HANDMADE &amp; STATIONERY</text>
</svg>
