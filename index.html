<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Little Things</title>
  <meta name="description"
    content="A professional serverless shopping catalog powered by Airtable and Telegram ordering.">
  <meta property="og:title" content="The Little Things — Shop Catalog">
  <meta property="og:description" content="Browse our curated collection and order instantly via Telegram.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="preload" href="assets/the-little-things-logo.svg" as="image" type="image/svg+xml">
  <link rel="icon" type="image/svg+xml" href="assets/the-little-things-logo.svg">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="backdrop-shape backdrop-shape-left" aria-hidden="true"></div>
  <div class="backdrop-shape backdrop-shape-right" aria-hidden="true"></div>

  <div class="page-shell">
    <header class="topbar">
      <a href="#" class="brand" aria-label="The Little Things home">
        <img class="brand-logo" src="assets/the-little-things-logo.svg" alt="The Little Things logo" loading="eager">
        <span class="brand-text">The Little Things</span>
      </a>

      <div class="topbar-actions">
        <a class="telegram-link" href="#" data-telegram-link target="_blank" rel="noopener noreferrer">
          <svg class="topbar-link-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M21.3 3.2a1 1 0 0 0-1-.14L2.8 10.4a1 1 0 0 0 .07 1.87l4.84 1.65 1.9 6.04a1 1 0 0 0 1.79.23l2.86-3.84 4.38 3.19a1 1 0 0 0 1.57-.62l2.15-14.71a1 1 0 0 0-.43-1.04M6.8 12.01l10.05-5.43-7.8 6.78-.3 2.62-.97-3.08zm11.73 5.03-3.5-2.56a1 1 0 0 0-1.4.2l-1.68 2.26.55-4.82 7.31-6.35z" />
          </svg>
          <span>Telegram</span>
        </a>
        <a class="facebook-link" href="https://www.facebook.com/profile.php?id=100075843279191" target="_blank"
          rel="noopener noreferrer">
          <svg class="topbar-link-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M13.5 21v-7.3h2.5l.4-2.9h-2.9V9c0-.84.24-1.42 1.45-1.42H16V5.01c-.56-.07-1.24-.11-2-.11-1.98 0-3.34 1.2-3.34 3.42v1.48H8.4v2.9h2.27V21z" />
          </svg>
          <span>Facebook</span>
        </a>
        <a class="tiktok-link" href="https://www.tiktok.com/@craft581" target="_blank" rel="noopener noreferrer">
          <svg class="topbar-link-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M19.59 6.69a4.8 4.8 0 0 1-3.77-1.85v8.13a6.56 6.56 0 1 1-5.67-6.5v3.2a3.35 3.35 0 1 0 2.46 3.23V2h3.21a4.8 4.8 0 0 0 3.77 3.67z" />
          </svg>
          <span>TikTok</span>
        </a>
      </div>
    </header>

    <main class="content-layout">
      <aside class="inventory-panel" aria-label="Catalog highlights">
        <h2>Live Inventory</h2>
        <div class="panel-metrics">
          <article>
            <p class="metric-value" id="metric-total-products">0</p>
            <p class="metric-label">Products</p>
          </article>
          <article>
            <p class="metric-value" id="metric-visible-products">0</p>
            <p class="metric-label">Showing</p>
          </article>
        </div>

        <div class="inventory-categories">
          <h3>Categories</h3>
          <nav id="category-menu" class="category-menu" aria-label="Product categories"></nav>
        </div>

        <a class="inventory-support" href="#" data-telegram-link target="_blank" rel="noopener noreferrer">
          Support on Telegram
        </a>
      </aside>

      <section id="catalog" class="catalog-section">
        <div class="catalog-head">
          <p class="section-label">Collection</p>
          <h2>Shop Catalog</h2>
        </div>

        <div class="catalog-controls">
          <label class="control-group">
            <span>Search product</span>
            <input id="search-input" type="search" placeholder="Type product name...">
          </label>

          <label class="control-group">
            <span>Sort by</span>
            <select id="sort-select">
              <option value="featured">Featured</option>
              <option value="name-asc">Name (A-Z)</option>
              <option value="name-desc">Name (Z-A)</option>
              <option value="price-asc">Price (Low to High)</option>
              <option value="price-desc">Price (High to Low)</option>
            </select>
          </label>

          <button id="clear-filters" class="clear-filters" type="button">Reset</button>
        </div>

        <div class="catalog-meta">
          <div id="status" class="status" aria-live="polite">
            <span class="spinner" aria-hidden="true"></span>
            <span>Loading products...</span>
          </div>
          <p class="result-count" id="result-count">0 products</p>
        </div>

        <section id="product-grid" class="product-grid" aria-label="Product catalog"></section>
      </section>
    </main>
  </div>

  <!-- Product Detail Modal -->
  <div id="product-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-label="Product details">
    <div class="modal-content">
      <button id="modal-close" class="modal-close" type="button" aria-label="Close modal">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
      <div class="modal-image-wrap">
        <button id="modal-prev" class="modal-nav-btn modal-nav-btn-prev" type="button" aria-label="Previous photo">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <polyline points="15 18 9 12 15 6" fill="none" stroke="currentColor" stroke-width="2.4"
              stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <img id="modal-image" class="modal-image" alt="">
        <button id="modal-next" class="modal-nav-btn modal-nav-btn-next" type="button" aria-label="Next photo">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <polyline points="9 18 15 12 9 6" fill="none" stroke="currentColor" stroke-width="2.4"
              stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <p id="modal-image-counter" class="modal-image-counter" aria-live="polite"></p>
      </div>
      <div class="modal-details">
        <span id="modal-badge" class="product-badge">In-Stock</span>
        <h2 id="modal-name" class="modal-name"></h2>
        <p id="modal-price" class="modal-price"></p>
        <p id="modal-description" class="modal-description"></p>
        <button id="modal-order" class="order-button modal-order-btn" type="button">ပစ္စည်းမှာရန်</button>
      </div>
    </div>
  </div>

  <!-- Scroll to top -->
  <button id="scroll-top" class="scroll-top-btn" type="button" aria-label="Scroll to top">
    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
      <polyline points="18 15 12 9 6 15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round" />
    </svg>
  </button>

  <template id="product-card-template">
    <article class="product-card">
      <div class="card-media">
        <img class="product-image" alt="">
        <span class="product-badge">In-Stock</span>
      </div>
      <div class="card-content">
        <div class="card-text">
          <h3 class="product-name"></h3>
          <p class="product-price"></p>
        </div>
        <div class="card-actions">
          <button class="details-button" type="button">အသေးစိတ်သိရှိရန်</button>
          <button class="order-button" type="button">ပစ္စည်းမှာရန်</button>
        </div>
      </div>
    </article>
  </template>

  <!-- Skeleton template -->
  <template id="skeleton-card-template">
    <article class="product-card skeleton-card" aria-hidden="true">
      <div class="card-media skeleton-shimmer"></div>
      <div class="card-content">
        <div class="card-text">
          <div class="skeleton-line skeleton-shimmer" style="width:75%;height:22px"></div>
          <div class="skeleton-line skeleton-shimmer" style="width:40%;height:18px"></div>
        </div>
        <div class="skeleton-line skeleton-shimmer" style="width:100%;height:43px;border-radius:11px"></div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>

</html>
